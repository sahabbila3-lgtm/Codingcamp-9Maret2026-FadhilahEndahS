<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Activity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        
        <div class="header-time" id="live-time"></div>
         <h1 class="greeting">Good Morning</h1>
        <div class="date-below" id="date-below"></div>
        
        <h1 class="greeting" id="greeting"></h1>
        <div class="date-below" id="date-below"></div>

        <div class="timer-card">
            <div class="timer-label">Focus Timer</div>
            <div class="timer-display" id="timer-display">25:00</div>
            <div class="timer-controls">
                <button class="timer-btn start" id="timer-start">Start</button>
                <button class="timer-btn stop" id="timer-stop">Stop</button>
                <button class="timer-btn reset" id="timer-reset">Reset</button>
            </div>
        </div>

        <section class="tasks">
            <h2>Tasks</h2>
            <div class="add-task-form">
                <input type="text" id="new-task-input" placeholder="Add a new task..." />
                <button id="add-task-btn">Add</button>
            </div>
            <ul class="task-list" id="task-list">
                <div><input type="checkbox" id="inbox">
                <label for="inbox">Sholat Lima Waktu</label></div>
                <input type="checkbox" id="inbox"> 
                <label for="inbox">Sedekah Subuh </label>
            </ul>
        </section>

        <section class="quick-links">
            <h2>Quick Links</h2>
            <div class="add-link-form">
                <input type="text" id="link-name" placeholder="Link name" />
                <input type="url" id="link-url" placeholder="https://..." />
                <button id="add-link-btn">Add Link</button>
            </div>
            <ul class="link-list" id="link-list">
                <!-- Links akan dirender via JS -->
            </ul>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
